server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    # bag en prefix-strippende proxy (Coolify/Traefik) må nginx' egne redirects
    # aldrig være absolutte — ellers peger de udenfor sub-stien
    absolute_redirect off;
    # kalenderen er forsiden
    index calendar.html index.html;

    # tekstkomprimering (video/billeder er allerede komprimeret)
    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 1024;

    # genererede video-assets må caches hårdt (de versioneres pr. dag-mappe)
    location /assets/ {
        add_header Cache-Control "public, max-age=604800";
    }

    # HTML skal altid revalideres, så nye låger/justeringer slår igennem
    location ~ \.html$ {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
